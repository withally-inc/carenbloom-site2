<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C&B & Friends WhatsApp Display Photo</title>
    <style>
      @font-face {
        font-family: "PP Mori";
        src: url("fonts/PPMori-Regular.otf") format("opentype");
        font-weight: 400;
      }

      @font-face {
        font-family: "PP Mori";
        src: url("fonts/PPMori-Semibold.otf") format("opentype");
        font-weight: 650;
      }

      @font-face {
        font-family: "Space Mono";
        src: url("fonts/SpaceMono-Bold.ttf") format("truetype");
        font-weight: 700;
      }

      :root {
        --ink: oklch(97.3% 0.013 78);
        --line: oklch(74% 0.015 78 / 0.25);
        --paper: oklch(18% 0.018 282);
        --paper-soft: oklch(36% 0.022 282);
        --coral: oklch(66% 0.19 31);
        --lime: oklch(72% 0.18 142);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background: #ddd;
      }

      .avatar {
        position: relative;
        width: 1200px;
        height: 1200px;
        overflow: hidden;
        background:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px),
          radial-gradient(circle at 86% 16%, oklch(82% 0.16 88 / 0.18), transparent 31%),
          var(--ink);
        background-size: 180px 180px, 180px 180px, 100% 100%, auto;
        color: var(--paper);
      }

      .label {
        position: absolute;
        top: 190px;
        left: 190px;
        right: 190px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        font-family: "Space Mono", monospace;
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
      }

      .label span:last-child {
        color: var(--paper-soft);
      }

      .mark {
        position: absolute;
        left: 160px;
        right: 160px;
        top: 362px;
        font-family: "PP Mori", Arial, sans-serif;
        font-weight: 650;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
      }

      .line {
        display: block;
        white-space: nowrap;
      }

      .cb {
        font-size: 260px;
        line-height: 0.76;
      }

      .amp {
        color: var(--coral);
        font-size: 145px;
        line-height: 0.74;
      }

      .friends {
        font-size: 145px;
        line-height: 0.82;
      }

      .friends .accent {
        color: var(--lime);
      }

      .corner {
        position: absolute;
        right: 205px;
        bottom: 200px;
        width: 62px;
        height: 62px;
        border-radius: 50%;
        background: var(--lime);
      }
    </style>
  </head>
  <body>
    <main class="avatar" aria-label="C&B & Friends display photo">
      <div class="label">
        <span>Care & Bloom</span>
        <span>Friends</span>
      </div>
      <div class="mark">
        <span class="line cb">C&B</span>
        <span class="line amp">&</span>
        <span class="line friends">Friend<span class="accent">s</span></span>
      </div>
      <div class="corner" aria-hidden="true"></div>
    </main>
  </body>
</html>
