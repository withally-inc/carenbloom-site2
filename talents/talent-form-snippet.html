<form class="talent-form" id="talent-search-form">
  <div class="talent-form-head">
    <p class="eyebrow" style="--accent: var(--talent-magenta)">Start the conversation</p>
    <h2>Tell us what you want to build.</h2>
  </div>
  <label>
    <span>Name</span>
    <input type="text" name="name" autocomplete="name" required>
  </label>
  <label>
    <span>Email</span>
    <input type="email" name="email" autocomplete="email" required>
  </label>
  <label>
    <span>Type</span>
    <select name="type" required>
      <option value="">Choose one</option>
      <option>Ex-founder</option>
      <option>EIR</option>
      <option>Content creator</option>
      <option>Operator</option>
      <option>Other builder</option>
    </select>
  </label>
  <label>
    <span>Link</span>
    <input type="url" name="link" placeholder="Portfolio, company, LinkedIn, X, TikTok">
  </label>
  <label class="talent-form-wide">
    <span>What should we know?</span>
    <textarea name="note" rows="6" required></textarea>
  </label>
  <button type="submit">Send note</button>
  <p class="talent-form-status" aria-live="polite"></p>
</form>
