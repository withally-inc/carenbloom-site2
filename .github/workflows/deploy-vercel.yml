name: Deploy to Vercel

on:
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_CLI_VERSION: 54.11.1
  PRODUCTION_URL: https://carenbloom-site2.vercel.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          const token = process.env.VERCEL_TOKEN || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };

          if (!token) {
            fail("VERCEL_TOKEN secret is missing.");
          }

          if (token.startsWith("vca_") || token.startsWith("vcr_")) {
            fail("VERCEL_TOKEN is a short-lived Vercel app OAuth token. Create a personal access token at https://vercel.com/account/tokens and update the GitHub secret.");
          }

          if (!token.startsWith("vcp_")) {
            fail("VERCEL_TOKEN must be a Vercel personal access token with the vcp_ prefix. Create one at https://vercel.com/account/tokens and update the GitHub secret.");
          }

          const response = await fetch("https://api.vercel.com/v2/user", {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) {
            fail(`VERCEL_TOKEN validation failed: HTTP ${response.status}. Create a personal access token at https://vercel.com/account/tokens and update the GitHub secret.`);
          }

          const projectId = process.env.VERCEL_PROJECT_ID;
          const teamId = process.env.VERCEL_ORG_ID;
          const projectResponse = await fetch(`https://api.vercel.com/v9/projects/${projectId}?teamId=${teamId}`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!projectResponse.ok) {
            fail(`VERCEL_TOKEN cannot access this Vercel project: HTTP ${projectResponse.status}. Create the token under the withallys-projects team scope, then update the GitHub secret.`);
          }
          NODE

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build Vercel output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -o pipefail
          vercel deploy --prebuilt --prod | tee deployment-output.txt
          deployment_url="$(tail -n 1 deployment-output.txt)"
          if ! echo "$deployment_url" | grep -Eq '^https://'; then
            echo "Vercel deploy did not emit a deployment URL."
            exit 1
          fi
          echo "deployment-url=$deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test production alias
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location "$PRODUCTION_URL" --output production.html &&
              grep -Fq "<title>Care & Bloom</title>" production.html; then
              exit 0
            fi
            sleep 3
          done

          echo "Production alias smoke test failed: $PRODUCTION_URL"
          exit 1
