name: Deploy to Vercel

on:
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_CLI_VERSION: 54.11.1
  PRODUCTION_URL: https://carenbloom-site2.vercel.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          const token = process.env.VERCEL_TOKEN || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };

          if (!token) {
            fail("VERCEL_TOKEN secret is missing.");
          }

          if (token.startsWith("vca_") || token.startsWith("vcr_")) {
            fail("VERCEL_TOKEN is a short-lived Vercel app OAuth token. Create a personal access token at https://vercel.com/account/tokens and update the GitHub secret.");
          }

          if (!token.startsWith("vcp_")) {
            fail("VERCEL_TOKEN must be a Vercel personal access token with the vcp_ prefix. Create one at https://vercel.com/account/tokens and update the GitHub secret.");
          }

          const response = await fetch("https://api.vercel.com/v2/user", {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!response.ok) {
            fail(`VERCEL_TOKEN validation failed: HTTP ${response.status}. Create a personal access token at https://vercel.com/account/tokens and update the GitHub secret.`);
          }

          const projectId = process.env.VERCEL_PROJECT_ID;
          const teamId = process.env.VERCEL_ORG_ID;
          const projectResponse = await fetch(`https://api.vercel.com/v9/projects/${projectId}?teamId=${teamId}`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (!projectResponse.ok) {
            fail(`VERCEL_TOKEN cannot access this Vercel project: HTTP ${projectResponse.status}. Create the token under the withallys-projects team scope, then update the GitHub secret.`);
          }
          NODE

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Prepare clean deployment source
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          echo "DEPLOY_DIR=$deploy_dir" >> "$GITHUB_ENV"

          git archive HEAD -- \
            3day \
            _astro \
            about \
            api \
            ats-distribution-comparison.html \
            ats-distribution-report.html \
            brands \
            capital \
            download-manifest.json \
            fonts \
            images \
            index.html \
            logos \
            mission \
            package-lock.json \
            package.json \
            scripts \
            talents \
            vercel.json \
            | tar -x -C "$deploy_dir"

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          vercel pull --yes --environment=production --no-color

      - name: Build Vercel output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          vercel build --prod --no-color

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"

          run_vercel() {
            env \
              -u GITHUB_ACTIONS \
              -u GITHUB_ACTOR \
              -u GITHUB_ACTOR_ID \
              -u GITHUB_BASE_REF \
              -u GITHUB_EVENT_NAME \
              -u GITHUB_HEAD_REF \
              -u GITHUB_REF \
              -u GITHUB_REF_NAME \
              -u GITHUB_REF_TYPE \
              -u GITHUB_REPOSITORY \
              -u GITHUB_REPOSITORY_ID \
              -u GITHUB_REPOSITORY_OWNER \
              -u GITHUB_REPOSITORY_OWNER_ID \
              -u GITHUB_RUN_ATTEMPT \
              -u GITHUB_RUN_ID \
              -u GITHUB_RUN_NUMBER \
              -u GITHUB_SERVER_URL \
              -u GITHUB_SHA \
              -u VERCEL_GIT_COMMIT_AUTHOR_LOGIN \
              -u VERCEL_GIT_COMMIT_AUTHOR_NAME \
              -u VERCEL_GIT_COMMIT_MESSAGE \
              -u VERCEL_GIT_COMMIT_REF \
              -u VERCEL_GIT_COMMIT_SHA \
              -u VERCEL_GIT_PREVIOUS_SHA \
              -u VERCEL_GIT_PROVIDER \
              -u VERCEL_GIT_PULL_REQUEST_ID \
              -u VERCEL_GIT_REPO_ID \
              -u VERCEL_GIT_REPO_OWNER \
              -u VERCEL_GIT_REPO_SLUG \
              "$@"
          }

          run_vercel timeout 240s vercel deploy --prebuilt --prod --yes --no-wait --no-color | tee deployment-output.txt
          deployment_url="$(grep -Eo 'https://[^[:space:]]+\.vercel\.app' deployment-output.txt | tail -n 1)"
          if ! echo "$deployment_url" | grep -Eq '^https://'; then
            echo "Vercel deploy did not emit a deployment URL."
            exit 1
          fi

          export DEPLOYMENT_URL="$deployment_url"
          node --input-type=module <<'NODE'
          const token = process.env.VERCEL_TOKEN;
          const teamId = process.env.VERCEL_ORG_ID;
          const deploymentUrl = process.env.DEPLOYMENT_URL.replace(/^https?:\/\//, "");

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };

          for (let attempt = 1; attempt <= 60; attempt += 1) {
            const response = await fetch(`https://api.vercel.com/v13/deployments/${deploymentUrl}?teamId=${teamId}`, {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!response.ok) {
              fail(`Vercel deployment status check failed: HTTP ${response.status}.`);
            }

            const deployment = await response.json();
            const state = deployment.readyState || "UNKNOWN";
            console.log(`Vercel deployment state: ${state}`);

            if (state === "READY") {
              if (deployment.aliasAssigned === false) {
                fail("Vercel deployment is ready but production alias was not assigned.");
              }
              process.exit(0);
            }

            if (["BLOCKED", "ERROR", "CANCELED"].includes(state)) {
              const author = deployment.meta?.githubCommitAuthorName || deployment.meta?.githubCommitAuthorLogin || "unknown";
              const errorLink = deployment.errorLink ? ` ${deployment.errorLink}` : "";
              fail(`Vercel deployment ${state}. Commit author: ${author}.${errorLink}`);
            }

            await sleep(5000);
          }

          fail("Timed out waiting for Vercel deployment to become ready.");
          NODE

          echo "deployment-url=$deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test production alias
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location "$PRODUCTION_URL" --output production.html &&
              grep -Fq "<title>Care & Bloom</title>" production.html; then
              exit 0
            fi
            sleep 3
          done

          echo "Production alias smoke test failed: $PRODUCTION_URL"
          exit 1
